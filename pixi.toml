[workspace]
authors = ["Old_cpu <1471913775@qq.com>"]
channels = ["conda-forge"]
name = "OpenCompiler"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.11.*"
mlir = ">=21.1.8,<22"
pip = ">=26.0.1,<27"
pyyaml = ">=6.0.3,<7"
tabulate = ">=0.9.0,<0.10"

[target.osx.pypi-dependencies]
numpy = ">=2.4.2,<3"
torch = { version = ">=2.9.1", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = ">=0.24.1", index = "https://download.pytorch.org/whl/cpu" }
torchaudio = { version = ">=2.9.1", index = "https://download.pytorch.org/whl/cpu" }
